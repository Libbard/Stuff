            // Helpers
            { 
                id: 8, category: 'helpers', 
                nameAr: "مطابقة النصوص", nameEn: "Brute-Force String Matching", 
                descAr: "البحث عن نمط داخل نص بإزاحة النمط ومطابقته حرفاً بحرف.", descEn: "Finding a pattern in a text by shifting and matching character by character.",

            {

                descAr: "تقسيم مصفوفة بحيث تكون العناصر الأصغر يسار المحور والأكبر يمينه.", descEn: "Partitioning an array so smaller elements are to the left of the pivot.", 
                compBest: "$\\Theta(n)$", compAvg: "$\\Theta(n)$", compWorst: "$\\Theta(n)$", 
                notesAr: "تُستخدم كخوارزمية تقسيم مساعدة لحل مشكلة التحديد.", notesEn: "Used as a helper partitioning algorithm for selection problems." 
            },
            { 
                id: 22, category: 'helpers', 
                nameAr: "تقسيم هور", nameEn: "Hoare Partitioning", 
                descAr: "تقسيم مصفوفة باستخدام مؤشرين يتحركان من الأطراف نحو المنتصف.", descEn: "Partitioning using two pointers moving from both ends towards the center.", 
                compBest: "$\\Theta(n)$", compAvg: "$\\Theta(n)$", compWorst: "$\\Theta(n)$", 
                notesAr: "تتوقف الخوارزمية وتتراجع عند تقاطع المؤشرين.", notesEn: "The algorithm stops and crosses over when pointers meet." 
            },
            { 
                id: 25, category: 'helpers', 
                nameAr: "ضرب مصفوفات ستراسن", nameEn: "Strassen's Matrix", 
                descAr: "طريقة مبتكرة لضرب مصفوفتين باستخدام 7 عمليات ضرب فقط بدلاً من 8.", descEn: "Innovative method to multiply matrices using only 7 multiplications instead of 8.", 
                compBest: "$\\Theta(n^{2.807})$", compAvg: "$\\Theta(n^{2.807})$", compWorst: "$\\Theta(n^{2.807})$", 
                notesAr: "أعلى كفاءة من خوارزمية القوة الغاشمة للمصفوفات الكبيرة.", notesEn: "Higher efficiency than the brute force algorithm for large matrices." 
            }
        ];

        // Categories Configuration (Dual Language)
        const categories = {
            'sort': { titleAr: 'خوارزميات الترتيب', titleEn: 'Sorting Algorithms', icon: 'ph-sort-ascending', color: 'blue' },
            'search': { titleAr: 'خوارزميات البحث والمصفوفات', titleEn: 'Search & Arrays', icon: 'ph-magnifying-glass-plus', color: 'indigo' },
            'graph': { titleAr: 'الرسوم البيانية والأشجار', titleEn: 'Graphs & Trees', icon: 'ph-graph', color: 'emerald' },
            'exhaustive': { titleAr: 'البحث الشامل والتوافيق', titleEn: 'Exhaustive Search', icon: 'ph-infinity', color: 'rose' },
            'math': { titleAr: 'الرياضيات والأعداد', titleEn: 'Math & Numerics', icon: 'ph-math-operations', color: 'amber' },
            'geometry': { titleAr: 'الهندسة الحسابية', titleEn: 'Computational Geometry', icon: 'ph-compass-tool', color: 'cyan' },
            'helpers': { titleAr: 'تقنيات مساعدة', titleEn: 'Helpers & Miscellaneous', icon: 'ph-puzzle-piece', color: 'slate' }
        };

        // Tailwind Color maps (Supports dark mode)
        const colorClasses = {
            'blue': { border: 'border-t-blue-500', text: 'text-blue-600 dark:text-blue-400', bg: 'bg-blue-50 dark:bg-blue-500/10', icon: 'text-blue-500 dark:text-blue-400', badgeBg: 'bg-blue-100 dark:bg-blue-500/20', badgeText: 'text-blue-700 dark:text-blue-300', boxBg: 'bg-white dark:bg-slate-800' },
            'indigo': { border: 'border-t-indigo-500', text: 'text-indigo-600 dark:text-indigo-400', bg: 'bg-indigo-50 dark:bg-indigo-500/10', icon: 'text-indigo-500 dark:text-indigo-400', badgeBg: 'bg-indigo-100 dark:bg-indigo-500/20', badgeText: 'text-indigo-700 dark:text-indigo-300', boxBg: 'bg-white dark:bg-slate-800' },
            'emerald': { border: 'border-t-emerald-500', text: 'text-emerald-600 dark:text-emerald-400', bg: 'bg-emerald-50 dark:bg-emerald-500/10', icon: 'text-emerald-500 dark:text-emerald-400', badgeBg: 'bg-emerald-100 dark:bg-emerald-500/20', badgeText: 'text-emerald-700 dark:text-emerald-300', boxBg: 'bg-white dark:bg-slate-800' },
            'rose': { border: 'border-t-rose-500', text: 'text-rose-600 dark:text-rose-400', bg: 'bg-rose-50 dark:bg-rose-500/10', icon: 'text-rose-500 dark:text-rose-400', badgeBg: 'bg-rose-100 dark:bg-rose-500/20', badgeText: 'text-rose-700 dark:text-rose-300', boxBg: 'bg-white dark:bg-slate-800' },
            'amber': { border: 'border-t-amber-500', text: 'text-amber-600 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-500/10', icon: 'text-amber-500 dark:text-amber-400', badgeBg: 'bg-amber-100 dark:bg-amber-500/20', badgeText: 'text-amber-700 dark:text-amber-300', boxBg: 'bg-white dark:bg-slate-800' },
            'cyan': { border: 'border-t-cyan-500', text: 'text-cyan-600 dark:text-cyan-400', bg: 'bg-cyan-50 dark:bg-cyan-500/10', icon: 'text-cyan-500 dark:text-cyan-400', badgeBg: 'bg-cyan-100 dark:bg-cyan-500/20', badgeText: 'text-cyan-700 dark:text-cyan-300', boxBg: 'bg-white dark:bg-slate-800' },
            'slate': { border: 'border-t-slate-500 dark:border-t-slate-400', text: 'text-slate-600 dark:text-slate-300', bg: 'bg-slate-50 dark:bg-slate-700/30', icon: 'text-slate-500 dark:text-slate-400', badgeBg: 'bg-slate-200 dark:bg-slate-600', badgeText: 'text-slate-700 dark:text-slate-200', boxBg: 'bg-white dark:bg-slate-800' }
        };

        // State variables
        let currentLang = 'ar';
        let isDarkMode = false;

        const mainContent = document.getElementById('mainContent');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const langToggleBtn = document.getElementById('langToggleBtn');
        const themeToggleBtn = document.getElementById('themeToggleBtn');

        function updateUIStatics() {
            const ui = uiText[currentLang];
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            
            document.getElementById('mainTitle').textContent = ui.mainTitle;
            document.getElementById('subTitle').textContent = ui.subTitle;
            document.getElementById('searchInput').placeholder = ui.searchPlaceholder;
            document.getElementById('langText').textContent = ui.langText;
            document.getElementById('noResultsTitle').textContent = ui.noResultsTitle;
            document.getElementById('noResultsDesc').textContent = ui.noResultsDesc;
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            
            if (isDarkMode) {
                html.classList.add('dark');
                themeIcon.classList.remove('ph-moon-stars');
                themeIcon.classList.add('ph-sun');
            } else {
                html.classList.remove('dark');
                themeIcon.classList.remove('ph-sun');
                themeIcon.classList.add('ph-moon-stars');
            }
        }

        // Render Function
        function renderContent(filterText = '') {
            mainContent.innerHTML = '';
            let totalMatches = 0;
            const ui = uiText[currentLang];

            Object.keys(categories).forEach(catKey => {
                const catData = categories[catKey];
                const theme = colorClasses[catData.color];
                
                // Filter
                const algosInCat = data.filter(alg => {
                    if (alg.category !== catKey) return false;
                    const searchStr = `${alg.nameAr} ${alg.nameEn} ${alg.descAr} ${alg.descEn} ${alg.notesAr} ${alg.notesEn}`.toLowerCase();
                    return searchStr.includes(filterText.toLowerCase());
                });

                if (algosInCat.length > 0) {
                    totalMatches += algosInCat.length;

                    const section = document.createElement('section');
                    section.className = "mb-14";
                    
                    const catTitle = currentLang === 'ar' ? catData.titleAr : catData.titleEn;

                    section.innerHTML = `
                        <div class="flex items-center gap-3 mb-6 pb-2 border-b border-slate-200/60 dark:border-slate-800">
                            <div class="p-2.5 rounded-lg ${theme.bg} ${theme.text}">
                                <i class="ph ${catData.icon} text-2xl"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-slate-800 dark:text-white font-cairo">${catTitle}</h2>
                            <span class="mr-auto ltr:mr-0 ltr:ml-auto px-3 py-1 text-sm font-bold rounded-full ${theme.badgeBg} ${theme.badgeText}">
                                ${algosInCat.length}
                            </span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 lg:gap-8" id="grid-${catKey}">
                        </div>
                    `;
                    
                    mainContent.appendChild(section);
                    const gridContainer = document.getElementById(`grid-${catKey}`);

                    algosInCat.forEach(alg => {
                        const card = document.createElement('div');
                        card.className = `algo-card h-full flex flex-col bg-white dark:bg-darkcard rounded-2xl border border-slate-100 dark:border-slate-800 relative overflow-hidden border-t-4 ${theme.border}`;
                        
                        const badgePos = currentLang === 'ar' ? 'left-4' : 'right-4';
                        const titlePad = currentLang === 'ar' ? 'pl-10' : 'pr-10';
                        
                        const title = currentLang === 'ar' ? alg.nameAr : alg.nameEn;
                        const subTitle = currentLang === 'ar' ? alg.nameEn : alg.nameAr;
                        const desc = currentLang === 'ar' ? alg.descAr : alg.descEn;
                        const notes = currentLang === 'ar' ? alg.notesAr : alg.notesEn;

                        card.innerHTML = `
                            <div class="absolute top-4 ${badgePos} w-8 h-8 rounded-full ${theme.bg} ${theme.text} flex items-center justify-center font-bold text-sm">
                                ${alg.id}
                            </div>
                            
                            <div class="p-5 flex-grow flex flex-col">
                                <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-0.5 font-cairo ${titlePad} leading-tight">
                                    ${title}
                                </h3>
                                <div class="text-xs font-bold tracking-wide text-slate-400 dark:text-slate-500 mb-4 uppercase">
                                    ${subTitle}
                                </div>
                                
                                <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed mb-5 flex-grow">
                                    ${desc}
                                </p>
                                
                                <!-- 3 Split Complexities Grid -->
                                <div class="rounded-xl p-3 mb-4 border border-slate-100 dark:border-slate-700/50 ${theme.bg}">
                                    <div class="flex items-center gap-1.5 mb-2 ${theme.text}">
                                        <i class="ph ph-chart-bar text-base"></i>
                                        <span class="text-[11px] font-bold tracking-wider">${ui.complexity}</span>
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <!-- Best -->
                                        <div class="flex flex-col items-center justify-center p-2 rounded-lg border border-slate-100 dark:border-slate-700/30 ${theme.boxBg} h-full w-full min-w-0">
                                            <span class="text-[11px] font-bold uppercase mb-2 opacity-75 ${theme.text} text-center w-full truncate">${ui.best}</span>
                                            <div class="math-scroll text-[13px] sm:text-[14px] font-bold text-slate-800 dark:text-slate-200 dir-ltr text-center w-full">
                                                ${alg.compBest}
                                            </div>
                                        </div>
                                        <!-- Avg -->
                                        <div class="flex flex-col items-center justify-center p-2 rounded-lg border border-slate-100 dark:border-slate-700/30 ${theme.boxBg} h-full w-full min-w-0">
                                            <span class="text-[11px] font-bold uppercase mb-2 opacity-75 ${theme.text} text-center w-full truncate">${ui.avg}</span>
                                            <div class="math-scroll text-[13px] sm:text-[14px] font-bold text-slate-800 dark:text-slate-200 dir-ltr text-center w-full">
                                                ${alg.compAvg}
                                            </div>
                                        </div>
                                        <!-- Worst -->
                                        <div class="flex flex-col items-center justify-center p-2 rounded-lg border border-slate-100 dark:border-slate-700/30 ${theme.boxBg} h-full w-full min-w-0">
                                            <span class="text-[11px] font-bold uppercase mb-2 opacity-75 ${theme.text} text-center w-full truncate">${ui.worst}</span>
                                            <div class="math-scroll text-[13px] sm:text-[14px] font-bold text-slate-800 dark:text-slate-200 dir-ltr text-center w-full">
                                                ${alg.compWorst}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="flex items-start gap-2 pt-3 border-t border-slate-100 dark:border-slate-800">
                                    <i class="ph ph-info text-lg mt-0.5 ${theme.icon}"></i>
                                    <p class="text-[13px] font-medium text-slate-500 dark:text-slate-400 leading-snug">
                                        ${notes}
                                    </p>
                                </div>
                            </div>
                        `;
                        gridContainer.appendChild(card);
                    });
                }
            });

            if (totalMatches === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
            }

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([mainContent]).catch((err) => console.log(err.message));
            }
        }

        // Listeners
        searchInput.addEventListener('input', (e) => {
            renderCardsThrottled(e.target.value);
        });

        langToggleBtn.addEventListener('click', () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            updateUIStatics();
            renderContent(searchInput.value);
        });

        themeToggleBtn.addEventListener('click', () => {
            toggleTheme();
        });

        // Throttle
        let timeout = null;
        function renderCardsThrottled(text) {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                renderContent(text);
            }, 150);
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            updateUIStatics();
            renderContent();
            
            // Check system preference for dark mode initially
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                toggleTheme();
            }

            setTimeout(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, 300);
        });
    </script>
</body>
</html>
